server.port=${SERVER_PORT:8089}
spotify.clientId=${SPOTIFY_CLIENT_ID}
spotify.clientSecret=${SPOTIFY_CLIENT_SECRET}
spotify.redirectUri=${SPOTIFY_REDIRECT_URI:http://localhost:3000}
spotify.api.base.url=${SPOTIFY_API_BASE_URL:https://api.spotify.com/v1}
frontend.url=${FRONTEND_URL:http://localhost:3000}
spring.application.name=spotify-integration-service

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
